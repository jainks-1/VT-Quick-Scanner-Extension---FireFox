<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: Arial, sans-serif;
      padding: 15px;
      margin: 0;
      background-color: #f9f9f9;
    }
    h3 { margin-top: 0; color: #333; }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #6200ee;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background-color: #3700b3; }
    
    .report-button {
      background-color: #444;
      font-size: 12px;
      margin-top: 10px;
      padding: 6px;
    }
    .report-button:hover {
      background-color: #222;
    }

    #result {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      display: none;
      font-size: 14px;
    }
    .safe { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .unsafe { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .loading { color: #666; font-style: italic; }
    
    .settings-container {
      margin-top: 20px;
      padding-top: 10px;
      border-top: 1px dashed #ccc;
    }
    .settings-title {
      font-size: 12px;
      color: #666;
      margin-bottom: 2px;
      font-weight: bold;
    }
    .api-note {
      font-size: 11px;
      color: #888;
      font-style: italic;
      margin-bottom: 8px;
    }
    .settings-row {
      display: flex;
      gap: 5px;
    }
    .settings-row input {
      margin-bottom: 0;
      font-size: 12px;
    }
    .settings-row button {
      width: auto;
      padding: 5px 10px;
      font-size: 12px;
      background-color: #555;
    }
    .settings-row button:hover { background-color: #333; }
  </style>
</head>
<body>

  <h3>VirusTotal Global Search</h3>
  <input type="text" id="urlInput" placeholder="Paste link, IP, domain, or file hash..." />
  <button id="checkBtn">Search VirusTotal</button>
  
  <div id="result"></div>

  <div class="settings-container">
    <div class="settings-title">VirusTotal API Key Configuration:</div>
    <div class="api-note">*Note: Free keys are limited to 4 requests per minute.</div>
    <div class="settings-row">
      <input type="password" id="apiKeyInput" placeholder="Paste your API key here..." />
      <button id="saveKeyBtn">Save</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
